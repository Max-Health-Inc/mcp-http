name: CI

on:
  push:
    branches: [main, develop, "develop/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify dist
        run: test -f dist/src/index.js && test -f dist/hono/index.js && test -f dist/cloudflare/index.js
